<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo Dashboard</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='24' height='24' viewBox='0 0 24 24' fill='none' stroke='%232563eb' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='M12 2L2 7l10 5 10-5-10-5z'/><path d='M2 17l10 5 10-5'/><path d='M2 12l10 5 10-5'/></svg>">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary: #3b82f6;
      --primary-dark: #2563eb;
      --bg-light: #f8fafc;
      --bg-gradient-light: linear-gradient(135deg, #f1f5f9 0%, #e0e7ff 50%, #eef2ff 100%);
      --glass-light: rgba(255, 255, 255, 0.7);
      --text-light: #1e293b;
      --text-secondary-light: #64748b;
      --border-light: rgba(255, 255, 255, 0.3);
      --shadow-light: 0 8px 32px rgba(31, 38, 135, 0.15);
    }

    .dark {
      --bg-dark: #0f172a;
      --bg-gradient-dark: linear-gradient(135deg, #020617 0%, #1e293b 50%, #0f172a 100%);
      --glass-dark: rgba(30, 41, 59, 0.7);
      --text-dark: #f1f5f9;
      --text-secondary-dark: #94a3b8;
      --border-dark: rgba(71, 85, 105, 0.3);
      --shadow-dark: 0 8px 32px rgba(0, 0, 0, 0.3);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: var(--bg-gradient-light);
      color: var(--text-light);
      min-height: 100vh;
      transition: all 0.3s ease;
      line-height: 1.6;
    }

    .dark body {
      background: var(--bg-gradient-dark);
      color: var(--text-dark);
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem;
    }

    /* Glassmorphism */
    .glass {
      background: var(--glass-light);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--border-light);
      border-radius: 1rem;
      box-shadow: var(--shadow-light);
    }

    .dark .glass {
      background: var(--glass-dark);
      border-color: var(--border-dark);
      box-shadow: var(--shadow-dark);
    }

    /* Header */
    header {
      margin-bottom: 2rem;
    }

    .header-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 2rem;
    }

    h1 {
      font-size: 2.5rem;
      font-weight: 800;
      background: linear-gradient(135deg, #3b82f6, #6366f1);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.5rem;
    }

    .subtitle {
      color: var(--text-secondary-light);
      font-size: 1rem;
    }

    .dark .subtitle {
      color: var(--text-secondary-dark);
    }

    .theme-toggle {
      width: 48px;
      height: 48px;
      border: none;
      background: var(--glass-light);
      backdrop-filter: blur(10px);
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
      border: 1px solid var(--border-light);
    }

    .dark .theme-toggle {
      background: var(--glass-dark);
      border-color: var(--border-dark);
    }

    .theme-toggle:hover {
      transform: scale(1.1);
    }

    /* Stats Grid */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .stat-card {
      padding: 1.5rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      animation: slideUp 0.5s ease forwards;
      opacity: 0;
      transform: translateY(20px);
    }

    .stat-card:nth-child(1) { animation-delay: 0.1s; }
    .stat-card:nth-child(2) { animation-delay: 0.2s; }
    .stat-card:nth-child(3) { animation-delay: 0.3s; }
    .stat-card:nth-child(4) { animation-delay: 0.4s; }

    .stat-icon {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .stat-value {
      font-size: 2rem;
      font-weight: 700;
      line-height: 1;
    }

    .stat-label {
      font-size: 0.875rem;
      opacity: 0.7;
    }

    /* Progress Bar */
    .progress-section {
      margin-bottom: 2rem;
    }

    .progress-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 0.5rem;
      font-size: 0.875rem;
      font-weight: 500;
    }

    .progress-bar {
      height: 12px;
      background: var(--glass-light);
      border-radius: 6px;
      overflow: hidden;
      border: 1px solid var(--border-light);
    }

    .dark .progress-bar {
      background: var(--glass-dark);
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #3b82f6, #6366f1);
      border-radius: 6px;
      transition: width 0.5s ease;
    }

    /* Main Layout */
    .main-grid {
      display: grid;
      grid-template-columns: 1fr 2fr;
      gap: 2rem;
    }

    @media (max-width: 968px) {
      .main-grid {
        grid-template-columns: 1fr;
      }
    }

    /* Card Styles */
    .card {
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }

    .card-title {
      font-size: 1.25rem;
      font-weight: 700;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    /* Form */
    .form-group {
      margin-bottom: 1rem;
    }

    label {
      display: block;
      font-size: 0.875rem;
      font-weight: 500;
      margin-bottom: 0.375rem;
      opacity: 0.8;
    }

    input[type="text"],
    select {
      width: 100%;
      padding: 0.75rem 1rem;
      border: 2px solid var(--border-light);
      background: var(--glass-light);
      backdrop-filter: blur(10px);
      border-radius: 0.75rem;
      color: inherit;
      font-size: 1rem;
      transition: all 0.2s ease;
    }

    .dark input[type="text"],
    .dark select {
      background: var(--glass-dark);
      border-color: var(--border-dark);
    }

    input[type="text"]:focus,
    select:focus,
    input[type="datetime-local"]:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
    }

    input[type="datetime-local"] {
      padding-left: 1rem;
      position: relative;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    .btn {
      padding: 0.75rem 1.5rem;
      border: none;
      border-radius: 0.75rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: white;
      box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(59, 130, 246, 0.4);
    }

    .btn-primary:active {
      transform: translateY(0);
    }

    .btn-secondary {
      background: var(--glass-light);
      border: 1px solid var(--border-light);
      color: inherit;
    }

    .dark .btn-secondary {
      background: var(--glass-dark);
    }

    .btn-secondary:hover {
      background: rgba(59, 130, 246, 0.1);
    }

    .btn-block {
      width: 100%;
    }

    /* Search & Filter */
    .controls {
      display: flex;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    @media (max-width: 640px) {
      .controls {
        flex-direction: column;
      }
    }

    .search-wrapper {
      position: relative;
      flex: 1;
    }

    .search-icon {
      position: absolute;
      left: 1rem;
      top: 50%;
      transform: translateY(-50%);
      opacity: 0.5;
    }

    .search-wrapper input {
      padding-left: 2.75rem;
    }

    .filter-buttons {
      display: flex;
      gap: 0.5rem;
    }

    .filter-btn {
      padding: 0.625rem 1rem;
      border: 1px solid var(--border-light);
      background: var(--glass-light);
      color: inherit;
      border-radius: 0.5rem;
      cursor: pointer;
      font-size: 0.875rem;
      font-weight: 500;
      transition: all 0.2s ease;
    }

    .dark .filter-btn {
      background: var(--glass-dark);
    }

    .filter-btn.active {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
    }

    .filter-btn:hover:not(.active) {
      background: rgba(59, 130, 246, 0.1);
      border-color: var(--primary);
    }

    /* Todo List */
    .todo-list {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .todo-item {
      padding: 1rem;
      display: flex;
      gap: 1rem;
      align-items: flex-start;
      animation: slideUp 0.3s ease;
    }

    .todo-item.completed {
      opacity: 0.6;
    }

    .todo-checkbox {
      width: 24px;
      height: 24px;
      border: 2px solid var(--border-light);
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.2s ease;
      margin-top: 2px;
    }

    .dark .todo-checkbox {
      border-color: var(--border-dark);
    }

    .todo-checkbox:hover {
      border-color: var(--primary);
    }

    .todo-checkbox.checked {
      background: #10b981;
      border-color: #10b981;
      color: white;
    }

    .todo-content {
      flex: 1;
      min-width: 0;
    }

    .todo-text {
      font-size: 1rem;
      margin-bottom: 0.5rem;
      word-wrap: break-word;
    }

    .todo-item.completed .todo-text {
      text-decoration: line-through;
      opacity: 0.6;
    }

    .todo-badges {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .badge {
      padding: 0.25rem 0.625rem;
      border-radius: 9999px;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: capitalize;
    }

    /* Priority badges */
    .priority-low {
      background: #dcfce7;
      color: #16a34a;
    }

    .dark .priority-low {
      background: rgba(34, 197, 94, 0.2);
      color: #4ade80;
    }

    .priority-medium {
      background: #fef3c7;
      color: #d97706;
    }

    .dark .priority-medium {
      background: rgba(251, 191, 36, 0.2);
      color: #fbbf24;
    }

    .priority-high {
      background: #fee2e2;
      color: #dc2626;
    }

    .dark .priority-high {
      background: rgba(239, 68, 68, 0.2);
      color: #f87171;
    }

    /* Category badges */
    .category-personal {
      background: #e9d5ff;
      color: #9333ea;
    }

    .dark .category-personal {
      background: rgba(168, 85, 247, 0.2);
      color: #c084fc;
    }

    .category-work {
      background: #dbeafe;
      color: #2563eb;
    }

    .dark .category-work {
      background: rgba(59, 130, 246, 0.2);
      color: #60a5fa;
    }

    .category-shopping {
      background: #fce7f3;
      color: #db2777;
    }

    .dark .category-shopping {
      background: rgba(236, 72, 153, 0.2);
      color: #f472b6;
    }

    .category-health {
      background: #dcfce7;
      color: #16a34a;
    }

    .dark .category-health {
      background: rgba(34, 197, 94, 0.2);
      color: #4ade80;
    }

    .category-learning {
      background: #fed7aa;
      color: #ea580c;
    }

    .dark .category-learning {
      background: rgba(249, 115, 22, 0.2);
      color: #fb923c;
    }

    .category-other {
      background: #e2e8f0;
      color: #475569;
    }

    .dark .category-other {
      background: rgba(71, 85, 105, 0.2);
      color: #94a3b8;
    }

    /* Due Date badges */
    .due-overdue {
      background: #fee2e2;
      color: #dc2626;
      font-weight: 600;
    }

    .dark .due-overdue {
      background: rgba(239, 68, 68, 0.2);
      color: #f87171;
    }

    .due-today {
      background: #fef3c7;
      color: #d97706;
      font-weight: 600;
    }

    .dark .due-today {
      background: rgba(251, 191, 36, 0.2);
      color: #fbbf24;
    }

    .due-upcoming {
      background: #dbeafe;
      color: #2563eb;
      font-weight: 600;
    }

    .dark .due-upcoming {
      background: rgba(59, 130, 246, 0.2);
      color: #60a5fa;
    }

    /* Todo Actions */
    .todo-actions {
      display: flex;
      gap: 0.5rem;
      opacity: 0;
      transition: opacity 0.2s ease;
    }

    .todo-item:hover .todo-actions {
      opacity: 1;
    }

    .action-btn {
      width: 32px;
      height: 32px;
      border: none;
      background: transparent;
      color: var(--text-secondary-light);
      cursor: pointer;
      border-radius: 0.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
    }

    .dark .action-btn {
      color: var(--text-secondary-dark);
    }

    .action-btn:hover {
      background: rgba(59, 130, 246, 0.1);
      color: var(--primary);
    }

    .action-btn.delete:hover {
      background: rgba(239, 68, 68, 0.1);
      color: #dc2626;
    }

    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
    }

    .empty-icon {
      width: 96px;
      height: 96px;
      margin: 0 auto 1.5rem;
      background: var(--glass-light);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0.5;
    }

    .dark .empty-icon {
      background: var(--glass-dark);
    }

    /* Edit Mode */
    .edit-input {
      margin-bottom: 0.75rem;
    }

    .edit-actions {
      display: flex;
      gap: 0.5rem;
    }

    /* Category Stats */
    .stat-list {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .stat-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.5rem;
      border-radius: 0.5rem;
      background: var(--glass-light);
    }

    .dark .stat-item {
      background: var(--glass-dark);
    }

    .stat-item-left {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .stat-count {
      font-weight: 700;
    }

    /* Animations */
    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .animate-fade-in {
      animation: fadeIn 0.5s ease;
    }

    /* Footer */
    footer {
      text-align: center;
      margin-top: 3rem;
      opacity: 0.6;
      font-size: 0.875rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="header-top">
        <div>
          <h1>Todo Dashboard</h1>
          <p class="subtitle">Organize your tasks, boost your productivity</p>
        </div>
        <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">
          <svg id="moonIcon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
          <svg id="sunIcon" style="display: none;" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
        </button>
      </div>

      <!-- Stats -->
      <div class="stats-grid">
        <div class="stat-card glass">
          <div class="stat-icon" style="background: #dbeafe; color: #2563eb;">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><line x1="10" y1="9" x2="8" y2="9"></line></svg>
          </div>
          <div>
            <div class="stat-value" id="totalCount">0</div>
            <div class="stat-label">Total Tasks</div>
          </div>
        </div>

        <div class="stat-card glass">
          <div class="stat-icon" style="background: #fef3c7; color: #d97706;">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
          </div>
          <div>
            <div class="stat-value" id="activeCount">0</div>
            <div class="stat-label">Active</div>
          </div>
        </div>

        <div class="stat-card glass">
          <div class="stat-icon" style="background: #fee2e2; color: #dc2626;">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
          </div>
          <div>
            <div class="stat-value" id="overdueCount">0</div>
            <div class="stat-label">Overdue</div>
          </div>
        </div>

        <div class="stat-card glass">
          <div class="stat-icon" style="background: #dcfce7; color: #16a34a;">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
          </div>
          <div>
            <div class="stat-value" id="completedCount">0</div>
            <div class="stat-label">Completed</div>
          </div>
        </div>

        <div class="stat-card glass">
          <div class="stat-icon" style="background: #e9d5ff; color: #9333ea;">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></svg>
          </div>
          <div>
            <div class="stat-value" id="progressPercent">0%</div>
            <div class="stat-label">Progress</div>
          </div>
        </div>
      </div>

      <!-- Progress Bar -->
      <div class="progress-section glass" style="padding: 1.5rem;">
        <div class="progress-header">
          <span>Today's Progress</span>
          <span id="progressText" style="font-weight: 600; color: var(--primary);">0%</span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill" style="width: 0%;"></div>
        </div>
      </div>
    </header>

    <div class="main-grid">
      <!-- Left Column -->
      <div class="left-column">
        <!-- Add Todo Form -->
        <div class="card glass">
          <h2 class="card-title">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
            Add New Task
          </h2>
          <form id="todoForm">
            <div class="form-group">
              <label for="todoText">Task Description</label>
              <input type="text" id="todoText" placeholder="What needs to be done?" required>
            </div>
            <div class="form-group">
              <label for="dueDate">Due Date & Time</label>
              <input type="datetime-local" id="dueDate" class="input-with-icon">
            </div>

            <div class="row">
              <div class="form-group">
                <label for="priority">Priority</label>
                <select id="priority">
                  <option value="low">Low</option>
                  <option value="medium" selected>Medium</option>
                  <option value="high">High</option>
                </select>
              </div>
              <div class="form-group">
                <label for="category">Category</label>
                <select id="category">
                  <option value="personal">Personal</option>
                  <option value="work">Work</option>
                  <option value="shopping">Shopping</option>
                  <option value="health">Health</option>
                  <option value="learning">Learning</option>
                  <option value="other">Other</option>
                </select>
              </div>
            </div>
            <button type="submit" class="btn btn-primary btn-block">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
              Add Task
            </button>
          </form>
        </div>

        <!-- Stats by Priority -->
        <div class="card glass">
          <h3 class="card-title">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><line x1="10" y1="9" x2="8" y2="9"></line></svg>
            By Priority
          </h3>
          <div class="stat-list" id="priorityStats"></div>
        </div>

        <!-- Stats by Category -->
        <div class="card glass">
          <h3 class="card-title">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22.19 12a9 9 0 0 1-8.63 8.62"></path><path d="M3 12a9 9 0 0 1 8.63-8.62"></path><path d="M3 12h18"></path><path d="M3 12a9 9 0 0 0 8.63 8.62"></path></svg>
            By Category
          </h3>
          <div class="stat-list" id="categoryStats"></div>
        </div>
      </div>

      <!-- Right Column -->
      <div class="right-column">
        <div class="card glass" style="min-height: 600px;">
          <!-- Search & Filter -->
          <div class="controls">
            <div class="search-wrapper">
              <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
              <input type="text" id="searchInput" placeholder="Search tasks...">
            </div>
            <div class="filter-buttons">
              <button class="filter-btn active" data-filter="all">All</button>
              <button class="filter-btn" data-filter="active">Active</button>
              <button class="filter-btn" data-filter="completed">Completed</button>
              <button class="filter-btn" data-filter="today">Due Today</button>
              <button class="filter-btn" data-filter="overdue">Overdue</button>
            </div>
          </div>

          <!-- Todo List -->
          <div id="todoList" class="todo-list"></div>
        </div>
      </div>
    </div>

    <footer>
      <p>Built with vanilla JavaScript, modern CSS & SVG icons</p>
    </footer>
  </div>

  <script>
    // Todo App Logic
    class TodoApp {
      constructor() {
        this.todos = this.loadTodos();
        this.filter = 'all';
        this.searchQuery = '';
        this.darkMode = this.loadDarkMode();
        this.editingId = null;
        this.editText = '';

        this.init();
      }

      init() {
        this.setupEventListeners();
        this.applyTheme();
        this.render();
      }

      // Storage
      loadTodos() {
        const saved = localStorage.getItem('todos');
        return saved ? JSON.parse(saved) : [];
      }

      saveTodos() {
        localStorage.setItem('todos', JSON.stringify(this.todos));
      }

      loadDarkMode() {
        return localStorage.getItem('darkMode') === 'true';
      }

      saveDarkMode() {
        localStorage.setItem('darkMode', this.darkMode);
      }

      // Event Listeners
      setupEventListeners() {
        // Form submission
        document.getElementById('todoForm').addEventListener('submit', (e) => {
          e.preventDefault();
          this.addTodo();
        });

        // Search
        document.getElementById('searchInput').addEventListener('input', (e) => {
          this.searchQuery = e.target.value.toLowerCase();
          this.render();
        });

        // Filter buttons
        document.querySelectorAll('.filter-btn').forEach(btn => {
          btn.addEventListener('click', () => {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            this.filter = btn.dataset.filter;
            this.render();
          });
        });

        // Theme toggle
        document.getElementById('themeToggle').addEventListener('click', () => {
          this.darkMode = !this.darkMode;
          this.applyTheme();
          this.saveDarkMode();
        });
      }

      // CRUD Operations
      addTodo() {
        const text = document.getElementById('todoText').value.trim();
        if (!text) return;

        const priority = document.getElementById('priority').value;
        const category = document.getElementById('category').value;
        const dueDateInput = document.getElementById('dueDate').value;
        const dueDate = dueDateInput ? new Date(dueDateInput).toISOString() : null;

        const todo = {
          id: Date.now(),
          text,
          completed: false,
          priority,
          category,
          dueDate,
          createdAt: new Date().toISOString()
        };

        this.todos.unshift(todo);
        this.saveTodos();
        this.render();

        // Reset form
        document.getElementById('todoForm').reset();
      }

      toggleTodo(id) {
        this.todos = this.todos.map(todo =>
          todo.id === id ? { ...todo, completed: !todo.completed } : todo
        );
        this.saveTodos();
        this.render();
      }

      deleteTodo(id) {
        this.todos = this.todos.filter(todo => todo.id !== id);
        this.saveTodos();
        this.render();
      }

      startEdit(id, text) {
        this.editingId = id;
        this.editText = text;
        this.render();
      }

      saveEdit(id, text, dueDateValue) {
        if (!text.trim()) {
          this.deleteTodo(id);
          return;
        }
        const dueDate = dueDateValue ? new Date(dueDateValue).toISOString() : null;
        this.todos = this.todos.map(todo =>
          todo.id === id ? { ...todo, text: text.trim(), dueDate } : todo
        );
        this.editingId = null;
        this.editText = '';
        this.saveTodos();
        this.render();
      }

      cancelEdit() {
        this.editingId = null;
        this.editText = '';
        this.render();
      }

      // Filtering & Search
      getFilteredTodos() {
        return this.todos.filter(todo => {
          let matchesFilter = true;

          if (this.filter === 'all') {
            matchesFilter = true;
          } else if (this.filter === 'active') {
            matchesFilter = !todo.completed;
          } else if (this.filter === 'completed') {
            matchesFilter = todo.completed;
          } else if (this.filter === 'today') {
            matchesFilter = this.getDueDateStatus(todo) === 'today';
          } else if (this.filter === 'overdue') {
            matchesFilter = this.getDueDateStatus(todo) === 'overdue' && !todo.completed;
          }

          const matchesSearch = todo.text.toLowerCase().includes(this.searchQuery);

          return matchesFilter && matchesSearch;
        });
      }

      // Stats
      getStats() {
        const total = this.todos.length;
        const completed = this.todos.filter(t => t.completed).length;
        const active = total - completed;
        const overdue = this.todos.filter(t => !t.completed && this.getDueDateStatus(t) === 'overdue').length;

        const byPriority = ['low', 'medium', 'high'].map(priority => ({
          priority,
          count: this.todos.filter(t => t.priority === priority).length
        }));

        const byCategory = ['personal', 'work', 'shopping', 'health', 'learning', 'other'].map(category => ({
          category,
          count: this.todos.filter(t => t.category === category).length
        }));

        return { total, active, completed, overdue, byPriority, byCategory, progress: total > 0 ? Math.round((completed / total) * 100) : 0 };
      }

      // Theme
      applyTheme() {
        document.documentElement.classList.toggle('dark', this.darkMode);
        const moonIcon = document.getElementById('moonIcon');
        const sunIcon = document.getElementById('sunIcon');
        if (this.darkMode) {
          moonIcon.style.display = 'none';
          sunIcon.style.display = 'block';
        } else {
          moonIcon.style.display = 'block';
          sunIcon.style.display = 'none';
        }
      }

      // Rendering
      render() {
        this.renderStats();
        this.renderProgress();
        this.renderTodoList();
        this.renderPriorityStats();
        this.renderCategoryStats();
      }

      renderStats() {
        const stats = this.getStats();
        document.getElementById('totalCount').textContent = stats.total;
        document.getElementById('activeCount').textContent = stats.active;
        document.getElementById('overdueCount').textContent = stats.overdue;
        document.getElementById('completedCount').textContent = stats.completed;
      }

      renderProgress() {
        const stats = this.getStats();
        document.getElementById('progressPercent').textContent = stats.progress + '%';
        document.getElementById('progressText').textContent = stats.progress + '%';
        document.getElementById('progressFill').style.width = stats.progress + '%';
      }

      renderTodoList() {
        const container = document.getElementById('todoList');
        const filtered = this.getFilteredTodos();

        if (filtered.length === 0) {
          container.innerHTML = `
            <div class="empty-state">
              <div class="empty-icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="opacity: 0.5;"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><line x1="10" y1="9" x2="8" y2="9"></line></svg>
              </div>
              <p style="font-size: 1.25rem; font-weight: 600; margin-bottom: 0.5rem;">
                ${this.todos.length === 0 ? 'No tasks yet' : 'No matching tasks'}
              </p>
              <p style="opacity: 0.6;">
                ${this.todos.length === 0
                  ? 'Add your first task to get started!'
                  : 'Try adjusting your search or filter'}
              </p>
            </div>
          `;
          return;
        }

        container.innerHTML = filtered.map(todo => {
          if (this.editingId === todo.id) {
            return `
              <div class="todo-item glass">
                <div class="todo-content">
                  <input type="text" class="edit-input" value="${this.escapeHtml(this.editText)}" id="editInput-${todo.id}">
                  <div class="form-group" style="margin-top: 0.5rem;">
                    <label style="font-size: 0.75rem; opacity: 0.7;">Due Date</label>
                    <input type="datetime-local" id="editDueDate-${todo.id}" value="${todo.dueDate ? todo.dueDate.slice(0, 16) : ''}" style="padding: 0.5rem 0.75rem; font-size: 0.875rem;">
                  </div>
                  <div class="edit-actions">
                    <button class="btn btn-primary" onclick="app.saveEdit(${todo.id}, document.getElementById('editInput-${todo.id}').value, document.getElementById('editDueDate-${todo.id}').value)">Save</button>
                    <button class="btn btn-secondary" onclick="app.cancelEdit()">Cancel</button>
                  </div>
                </div>
              </div>
            `;
          }

          return `
            <div class="todo-item glass ${todo.completed ? 'completed' : ''}">
              <div class="todo-checkbox ${todo.completed ? 'checked' : ''}" onclick="app.toggleTodo(${todo.id})">
                ${todo.completed ? '<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>' : ''}
              </div>
              <div class="todo-content">
                <div class="todo-text">${this.escapeHtml(todo.text)}</div>
                <div class="todo-badges">
                  <span class="badge priority-${todo.priority}">${todo.priority}</span>
                  <span class="badge category-${todo.category}">${todo.category}</span>
                  ${todo.dueDate ? `<span class="badge due-${this.getDueDateStatus(todo)}">${this.formatDueDate(todo)}</span>` : ''}
                </div>
                <div class="todo-actions">
                  <button class="action-btn" onclick="app.startEdit(${todo.id}, '${this.escapeHtml(todo.text)}')" title="Edit">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
                  </button>
                  <button class="action-btn delete" onclick="app.deleteTodo(${todo.id})" title="Delete">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
                  </button>
                </div>
              </div>
            </div>
          `;
        }).join('');

        // Focus edit input if present
        if (this.editingId) {
          const editInput = document.getElementById(`editInput-${this.editingId}`);
          if (editInput) {
            editInput.focus();
            editInput.addEventListener('keydown', (e) => {
              if (e.key === 'Enter') {
                const editDueDate = document.getElementById(`editDueDate-${this.editingId}`);
                this.saveEdit(this.editingId, editInput.value, editDueDate ? editDueDate.value : '');
              } else if (e.key === 'Escape') {
                this.cancelEdit();
              }
            });
          }
        }
      }

      renderPriorityStats() {
        const stats = this.getStats();
        const container = document.getElementById('priorityStats');
        const priorityNames = { low: 'Low', medium: 'Medium', high: 'High' };

        container.innerHTML = stats.byPriority.map(item => `
          <div class="stat-item">
            <div class="stat-item-left">
              <span class="badge priority-${item.priority}">${priorityNames[item.priority]}</span>
              <span style="text-transform: capitalize;">${item.priority}</span>
            </div>
            <span class="stat-count">${item.count}</span>
          </div>
        `).join('');
      }

      renderCategoryStats() {
        const stats = this.getStats();
        const container = document.getElementById('categoryStats');
        const categoryNames = {
          personal: 'Personal',
          work: 'Work',
          shopping: 'Shopping',
          health: 'Health',
          learning: 'Learning',
          other: 'Other'
        };

        container.innerHTML = stats.byCategory.map(item => `
          <div class="stat-item">
            <div class="stat-item-left">
              <span class="badge category-${item.category}">${categoryNames[item.category]}</span>
              <span style="text-transform: capitalize;">${item.category}</span>
            </div>
            <span class="stat-count">${item.count}</span>
          </div>
        `).join('');
      }

      getDueDateStatus(todo) {
        if (!todo.dueDate) return null;

        const now = new Date();
        const dueDate = new Date(todo.dueDate);
        const tomorrow = new Date(now);
        tomorrow.setDate(tomorrow.getDate() + 1);
        const yesterday = new Date(now);
        yesterday.setDate(yesterday.getDate() - 1);

        // Reset time for day comparison
        const todayStart = new Date(now.getFullYear(), now.getMonth(), now.getDate());
        const dueDateStart = new Date(dueDate.getFullYear(), dueDate.getMonth(), dueDate.getDate());

        if (dueDateStart < todayStart) return 'overdue';
        if (dueDateStart.getTime() === todayStart.getTime()) return 'today';
        if (dueDateStart.getTime() <= tomorrow.getTime()) return 'upcoming';
        return 'upcoming';
      }

      formatDueDate(todo) {
        if (!todo.dueDate) return '';
        const dueDate = new Date(todo.dueDate);
        const now = new Date();
        const tomorrow = new Date(now);
        tomorrow.setDate(tomorrow.getDate() + 1);
        const yesterday = new Date(now);
        yesterday.setDate(yesterday.getDate() - 1);

        // Reset time for day comparison
        const todayStart = new Date(now.getFullYear(), now.getMonth(), now.getDate());
        const dueDateStart = new Date(dueDate.getFullYear(), dueDate.getMonth(), dueDate.getDate());

        const status = this.getDueDateStatus(todo);
        let label = '';

        if (status === 'overdue') {
          label = 'Overdue';
        } else if (status === 'today') {
          label = 'Today';
        } else if (status === 'upcoming' && dueDateStart.getTime() <= tomorrow.getTime()) {
          label = 'Tomorrow';
        } else {
          // Format: "Dec 24, 2:30 PM" or "Dec 24" if time is midnight
          const dateStr = dueDate.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
          const timeStr = dueDate.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });
          const isMidnight = dueDate.getHours() === 0 && dueDate.getMinutes() === 0;
          label = isMidnight ? dateStr : `${dateStr}, ${timeStr}`;
        }

        return label;
      }

      escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
      }
    }

    // Initialize app when DOM is ready
    const app = new TodoApp();
    // Make app globally available for onclick handlers
    window.app = app;
  </script>
</body>
</html>
